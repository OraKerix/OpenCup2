tournament:
  name: "OpenCup"

  # Ticks to wait between rounds in a multi-round game (20 ticks = 1 second)
  round_reset_delay_ticks: 60

  # Ticks to wait after a game ends before launching the next one
  post_game_delay_ticks: 200

  games:
  - minigame: test_minigame
    arena: test_arena
    rounds: 1
    countdown_seconds: 5
    timeout_seconds: 300
    scoring:
       1st:  10
       2nd: 7
       3rd: 5
       kill: 7
       default: 1
  # ── Example entry — duplicate and modify for each game in your tournament ──
  #
  # - minigame:           The @MinigameDescriptor id of the minigame class
  #   arena:              The id of the arena file in plugins/OpenCup/arenas/
  #   rounds:             Number of rounds (1 = single round)
  #   countdown_seconds:  Lobby countdown before gameplay starts
  #   timeout_seconds:    Force-end the game after this many seconds
  #   scoring:
  #     1st:  10          Points awarded per placement
  #     2nd:  7
  #     3rd:  5
  #     default: 1        Applied to all placements not listed above
  #
  # No games are defined by default. Add your minigames below: